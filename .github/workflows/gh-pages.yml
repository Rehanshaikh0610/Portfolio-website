name: Deploy to GitHub Pages

# Grant the workflow explicit permission to write repository contents
permissions:
  contents: write

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Ensure we have full history and credentials available for the deploy step
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate index.html for GitHub Pages
        run: |
          cd dist/client
          # pick the built index JS and styles files (first match)
          INDEX_JS=$(basename "$(ls assets/index-*.js | head -n1)")
          STYLES_CSS=$(basename "$(ls assets/styles-*.css | head -n1 || true)")
          echo "Generating index.html using $INDEX_JS and $STYLES_CSS"
          cat > index.html <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1" />
              <title>Portfolio</title>
              $( [ -n "$STYLES_CSS" ] && echo "<link rel=\"stylesheet\" href=\"./assets/$STYLES_CSS\">" || echo "" )
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="./assets/$INDEX_JS"></script>
            </body>
          </html>
          HTML

      - name: Configure git for deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The Vite build outputs the client static site to dist/client
          publish_dir: ./dist/client
          publish_branch: gh-pages
